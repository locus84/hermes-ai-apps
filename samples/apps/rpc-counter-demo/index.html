<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RPC Counter Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #080b12; color: #f8fbff; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: min(680px, 100%); border: 1px solid rgba(125, 211, 252, .28); border-radius: 24px; background: linear-gradient(145deg, rgba(15,23,42,.96), rgba(2,6,23,.86)); box-shadow: 0 30px 90px rgba(0,0,0,.45); padding: 28px; }
    .eyebrow { color: #67e8f9; letter-spacing: .16em; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    h1 { margin: 10px 0 8px; font-size: clamp(34px, 7vw, 76px); line-height: .9; }
    p { color: #b6c9dc; line-height: 1.65; }
    .count { margin: 24px 0; display: grid; place-items: center; height: 180px; border-radius: 22px; background: radial-gradient(circle at 50% 0%, rgba(34,211,238,.25), transparent 55%), rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.08); font-size: 82px; font-weight: 900; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button { border: 1px solid rgba(125,211,252,.28); background: rgba(14,165,233,.14); color: #e0f7ff; border-radius: 14px; padding: 12px 16px; font-weight: 800; cursor: pointer; }
    button:hover { background: rgba(14,165,233,.24); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .log { margin-top: 18px; color: #93a9bc; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; white-space: pre-wrap; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="eyebrow">AI Apps · Serverless RPC</div>
      <h1>RPC Counter</h1>
      <p>정적 HTML 앱이 parent dashboard bridge를 통해 이 앱 폴더의 <code>server.py</code> 함수를 호출합니다.</p>
      <div id="count" class="count">…</div>
      <div class="actions">
        <button id="inc1">+1</button>
        <button id="inc5">+5</button>
        <button id="reset">Reset</button>
        <button id="refresh">Refresh</button>
      </div>
      <div id="log" class="log">Loading…</div>
    </section>
  </main>

  <script>window.AI_APPS_GUID = "rpc-counter-demo";</script>
  <script src="../../app-bridge.js"></script>
  <script>
    const countEl = document.getElementById('count');
    const logEl = document.getElementById('log');
    const buttons = Array.from(document.querySelectorAll('button'));

    function setBusy(busy) {
      buttons.forEach((button) => { button.disabled = busy; });
    }

    async function rpc(functionName, payload) {
      if (!window.AIApps || typeof window.AIApps.rpc !== 'function') {
        throw new Error('RPC bridge not found. Open this app through the AI Apps dashboard preview or a direct standalone URL under /dashboard-plugins/ai-apps/dist/apps/.');
      }
      return window.AIApps.rpc(functionName, payload || {}, { guid: 'rpc-counter-demo' });
    }

    function render(state) {
      state = state || {};
      countEl.textContent = state.count ?? 0;
      logEl.classList.remove('error');
      const events = Array.isArray(state.events) ? state.events : [];
      logEl.textContent = events.length ? events.join('\n') : 'No events yet';
    }

    async function call(functionName, payload) {
      setBusy(true);
      try {
        render(await rpc(functionName, payload));
      } catch (err) {
        logEl.classList.add('error');
        logEl.textContent = String((err && err.message) || err);
      } finally {
        setBusy(false);
      }
    }

    document.getElementById('inc1').onclick = () => call('increment', { amount: 1 });
    document.getElementById('inc5').onclick = () => call('increment', { amount: 5 });
    document.getElementById('reset').onclick = () => call('reset', {});
    document.getElementById('refresh').onclick = () => call('get_state', {});
    call('get_state', {});
  </script>
</body>
</html>
