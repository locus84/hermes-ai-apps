<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample RPC App</title>
  <script>window.AI_APPS_GUID = "sample-rpc";</script>
  <script src="../../app-bridge.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 15% 10%, rgba(34,211,238,.28), transparent 28%), radial-gradient(circle at 90% 20%, rgba(168,85,247,.22), transparent 28%), #08111f; color: #f8fbff; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .card { width: min(760px, 100%); border: 1px solid rgba(186,230,253,.24); border-radius: 28px; padding: 30px; background: linear-gradient(145deg, rgba(15,23,42,.92), rgba(3,7,18,.8)); box-shadow: 0 30px 100px rgba(0,0,0,.42); }
    .eyebrow { color: #67e8f9; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; font-weight: 800; }
    h1 { margin: 12px 0 8px; font-size: clamp(34px, 7vw, 72px); line-height: .9; }
    p { color: #bfd3e7; line-height: 1.65; }
    .counter { display: flex; align-items: end; gap: 12px; margin: 28px 0; }
    .count { font-size: clamp(64px, 14vw, 140px); line-height: .8; font-weight: 900; color: #e0f2fe; }
    .label { color: #7dd3fc; margin-bottom: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    button { border: 1px solid rgba(186,230,253,.24); border-radius: 14px; background: rgba(255,255,255,.08); color: white; padding: 12px 16px; cursor: pointer; font-weight: 700; }
    button:hover { border-color: #67e8f9; }
    pre { margin-top: 20px; max-height: 220px; overflow: auto; border: 1px solid rgba(186,230,253,.16); border-radius: 16px; background: rgba(0,0,0,.24); padding: 14px; color: #c7e7ff; }
    .status { min-height: 20px; color: #bae6fd; font-size: 13px; margin-top: 14px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="eyebrow">AI Apps Serverless App</div>
      <h1>RPC Counter</h1>
      <p>이 앱은 정적 HTML이지만, iframe preview 안에서는 parent dashboard plugin을 통해 <code>server.py</code>의 Python function을 subprocess로 호출합니다.</p>
      <div class="counter"><div id="count" class="count">—</div><div class="label">server-backed count</div></div>
      <div class="actions">
        <button id="inc1">+1 via server.py</button>
        <button id="inc5">+5 via server.py</button>
        <button id="reset">Reset</button>
        <button id="refresh">Refresh</button>
      </div>
      <div id="status" class="status">Loading…</div>
      <pre id="events">[]</pre>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    function render(data) {
      $("count").textContent = data.count ?? 0;
      $("events").textContent = JSON.stringify(data.events || [], null, 2);
      $("status").textContent = "server time: " + (data.server_time || "saved");
    }
    async function rpc(name, payload) {
      if (!window.AIApps) throw new Error("AIApps bridge unavailable. Open inside the dashboard preview for RPC.");
      return await window.AIApps.rpc(name, payload, { guid: "sample-rpc" });
    }
    async function load() {
      try { render(await rpc("get_state", {})); }
      catch (err) { $("status").textContent = err.message; }
    }
    async function inc(step) { render(await rpc("increment", { step })); }
    $("inc1").onclick = () => inc(1).catch(err => $("status").textContent = err.message);
    $("inc5").onclick = () => inc(5).catch(err => $("status").textContent = err.message);
    $("reset").onclick = () => rpc("reset", {}).then(render).catch(err => $("status").textContent = err.message);
    $("refresh").onclick = load;
    load();
  </script>
</body>
</html>
