<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Apps Sample</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 20% 20%, rgba(56,189,248,.25), transparent 30%), #070b14; color: #eef6ff; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .card { width: min(720px, 100%); border: 1px solid rgba(148, 223, 255, .28); border-radius: 28px; background: linear-gradient(145deg, rgba(15,23,42,.92), rgba(2,6,23,.78)); box-shadow: 0 30px 100px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04); padding: 34px; }
    .eyebrow { color: #7dd3fc; letter-spacing: .18em; font-size: 12px; text-transform: uppercase; font-weight: 800; }
    h1 { margin: 12px 0 8px; font-size: clamp(32px, 6vw, 64px); line-height: .95; }
    p { color: #bdd7ee; line-height: 1.7; }
    code { color: #bae6fd; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
    .tile { border: 1px solid rgba(148, 223, 255, .18); border-radius: 16px; padding: 16px; background: rgba(255,255,255,.045); }
    .tile b { display: block; font-size: 24px; }
    .tile span { color: #9fb9d2; font-size: 13px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="eyebrow">Hermes AI Apps</div>
      <h1>정적 UI 산출물 미리보기</h1>
      <p>이 샘플은 <code>sample-183f859d</code> GUID 폴더에 저장된 독립 HTML입니다. 대시보드에서는 iframe으로 보이고, 직접 URL로 열면 풀 화면으로 보입니다.</p>
      <div class="grid">
        <div class="tile"><b>1</b><span>GUID folder</span></div>
        <div class="tile"><b>2</b><span>manifest.json</span></div>
        <div class="tile"><b>3</b><span>index.html</span></div>
      </div>
    </section>
  </main>
</body>
</html>
